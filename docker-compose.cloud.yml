version: '3.9'

# Production deployment using external cloud database (Hostinger)
# Usage: docker-compose -f docker-compose.cloud.yml up -d
# Requires .env file with DATABASE_URL pointing to cloud PostgreSQL

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: asios_server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      PORT: 3000
      CLIENT_URL: ${CLIENT_URL:-http://localhost}
    ports:
      - "3000:3000"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: asios_client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "80:80"

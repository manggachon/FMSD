<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 140" width="320" height="140">
  <!-- Background white rounded rect with navy border -->
  <rect x="2" y="2" width="316" height="136" rx="10" ry="10"
        fill="white" stroke="#1a2a6c" stroke-width="3"/>

  <!-- "Go" — dark navy blue -->
  <text x="22" y="90"
        font-family="Arial Black, Arial, sans-serif"
        font-size="68" font-weight="900"
        fill="#1a2a6c">Go</text>

  <!-- "2" — red -->
  <text x="128" y="90"
        font-family="Arial Black, Arial, sans-serif"
        font-size="68" font-weight="900"
        fill="#e01020">2</text>

  <!-- "Win" — yellow with dark outline -->
  <text x="163" y="90"
        font-family="Arial Black, Arial, sans-serif"
        font-size="68" font-weight="900"
        fill="#1a1a1a"
        stroke="#1a1a1a" stroke-width="3"
        paint-order="stroke">Win</text>
  <text x="163" y="90"
        font-family="Arial Black, Arial, sans-serif"
        font-size="68" font-weight="900"
        fill="#f5e50a">Win</text>

  <!-- Tagline: "Good Drive Good Service" — blue -->
  <text x="160" y="118"
        font-family="Arial, sans-serif"
        font-size="17" font-weight="700"
        fill="#1a6cc8"
        text-anchor="middle">Good Drive Good Service</text>
</svg>

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Server CI ───────────────────────────────────────────────────────────────
  server-ci:
    name: Server (Node.js + TypeScript)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB:       fmsd_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Generate Prisma client
        working-directory: server
        env:
          DATABASE_URL: postgresql://postgres:testpassword@localhost:5432/fmsd_test
        run: npx prisma generate

      - name: Run migrations
        working-directory: server
        env:
          DATABASE_URL: postgresql://postgres:testpassword@localhost:5432/fmsd_test
        run: npx prisma migrate deploy

      - name: TypeScript build
        working-directory: server
        run: npm run build

  # ── Client CI ───────────────────────────────────────────────────────────────
  client-ci:
    name: Client (React + Vite)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Lint
        working-directory: client
        run: npm run lint

      - name: TypeScript check
        working-directory: client
        run: npx tsc --noEmit

      - name: Vite build
        working-directory: client
        run: npm run build

  # ── Docker Build Validation ─────────────────────────────────────────────────
  docker-build:
    name: Docker Build (validate)
    runs-on: ubuntu-latest
    needs: [server-ci, client-ci]

    steps:
      - uses: actions/checkout@v4

      - name: Build server image
        run: docker build -t fmsd-server:ci ./server

      - name: Build client image
        run: docker build -t fmsd-client:ci ./client

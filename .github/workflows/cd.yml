name: CD — Deploy to Production

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.github/SECRETS.md'

jobs:
  # ── Build & Push Docker Images to GHCR ─────────────────────────────────────
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      server_tag: ${{ steps.meta-server.outputs.tags }}
      client_tag: ${{ steps.meta-client.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Server image
      - name: Docker metadata (server)
        id: meta-server
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/fmsd-server
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & Push server
        uses: docker/build-push-action@v5
        with:
          context:   ./server
          push:      true
          tags:      ${{ steps.meta-server.outputs.tags }}
          labels:    ${{ steps.meta-server.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # Client image
      - name: Docker metadata (client)
        id: meta-client
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/fmsd-client
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & Push client
        uses: docker/build-push-action@v5
        with:
          context:   ./client
          push:      true
          tags:      ${{ steps.meta-client.outputs.tags }}
          labels:    ${{ steps.meta-client.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── Deploy to Production Server ─────────────────────────────────────────────
  deploy:
    name: Deploy to VPS (187.77.136.29)
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER:  ${{ github.repository_owner }}
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port:     22
          envs:     GHCR_TOKEN,GHCR_USER
          script: |
            set -e
            cd /opt/fmsd

            echo "Login to GHCR..."
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            echo "Pulling latest images..."
            docker compose pull

            echo "Stopping old containers..."
            docker compose down --remove-orphans

            echo "Starting services..."
            docker compose up -d

            echo "Running migrations..."
            docker compose exec -T server npx prisma migrate deploy

            echo "Waiting for health check..."
            sleep 10
            curl -sf http://localhost:3001/health || (docker compose logs server --tail=30 && exit 1)

            echo "Deploy complete!"
            docker compose ps

      - name: Notify Telegram (success)
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.DEPLOY_NOTIFY_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.DEPLOY_NOTIFY_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="✅ *FMSD Deploy สำเร็จ*%0A🔗 Commit: \`${{ github.sha }}\`%0A👤 By: ${{ github.actor }}%0A🌐 http://187.77.136.29:5174"

      - name: Notify Telegram (failure)
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.DEPLOY_NOTIFY_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.DEPLOY_NOTIFY_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="❌ *FMSD Deploy ล้มเหลว*%0A🔗 Commit: \`${{ github.sha }}\`%0A👤 By: ${{ github.actor }}%0A📋 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

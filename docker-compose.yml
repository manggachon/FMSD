version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: asios_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: asios_fleet
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: asios_server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-secure_password}@postgres:5432/asios_fleet
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      PORT: 3000
      CLIENT_URL: http://localhost:5173
    ports:
      - "3000:3000"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: asios_client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "5173:80"

volumes:
  postgres_data:

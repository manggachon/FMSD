name: fmsd

services:
  postgres:
    image: postgres:15-alpine
    container_name: fmsd-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       fmsd_fleet
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    image: ghcr.io/manggachon/fmsd-server:latest
    container_name: fmsd-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV:     production
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/fmsd_fleet
      JWT_SECRET:   ${JWT_SECRET:?JWT_SECRET is required}
      PORT:         3001
      CLIENT_URL:   ${CORS_ORIGIN:-http://187.77.136.29:5174}
    ports:
      - "0.0.0.0:3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  client:
    image: ghcr.io/manggachon/fmsd-client:latest
    container_name: fmsd-client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "0.0.0.0:5174:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    name: fmsd_postgres_data
